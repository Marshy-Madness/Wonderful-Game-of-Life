# Loads HOST_DATA_PATH from `.env` in this directory (copy from `.env.example`).
# Reverse proxy can point at port 2988; no separate /api forwarding needed.

services:
  app:
    build: .
    ports:
      - "2988:2988"
    environment:
      - PORT=2988
      - DATA_DIR=/data
      - STATIC_DIR=/app/client/build
    volumes:
      - ${HOST_DATA_PATH:-./data}:/data
    restart: unless-stopped
